<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="js/script.js" defer></script>
    <title data-i18n="game_page_title">Tic Tac Toe - Mein Portfolio</title>
</head>

<body>
    <a href="#main-content" class="skip-link" data-i18n="game_skip_link">
        Zum Inhalt springen
    </a>

    <header>
    </header>

    <main id="main-content">
        <h1 data-i18n="game_h1">Tic Tac Toe</h1>

        <section id="game-section">
            <h2 class="visually-hidden" data-i18n="game_h2_hidden">Spielfeld</h2>
            <div id="game-grid" role="grid" data-i18n-aria="game_grid_label" aria-label="Tic Tac Toe Spielfeld" aria-describedby="game-status">
                                <!-- 9 Felder für das Spiel -->
                <button role="gridcell" class="cell" data-index="0" aria-label="Feld 1, leer"></button>
                <button role="gridcell" class="cell" data-index="1" aria-label="Feld 2, leer"></button>
                <button role="gridcell" class="cell" data-index="2" aria-label="Feld 3, leer"></button>
                <button role="gridcell" class="cell" data-index="3" aria-label="Feld 4, leer"></button>
                <button role="gridcell" class="cell" data-index="4" aria-label="Feld 5, leer"></button>
                <button role="gridcell" class="cell" data-index="5" aria-label="Feld 6, leer"></button>
                <button role="gridcell" class="cell" data-index="6" aria-label="Feld 7, leer"></button>
                <button role="gridcell" class="cell" data-index="7" aria-label="Feld 8, leer"></button>
                <button role="gridcell" class="cell" data-index="8" aria-label="Feld 9, leer"></button>
            </div>

            <!-- Statusanzeige -->
            <p id="game-status" aria-live="polite" data-i18n="game_status_start">Spieler X ist am Zug</p>

            <!-- Steuerung -->
            <div class="game-controls">
                <button type="button" id="reset-game" data-i18n-aria="game_reset_aria" aria-label="Spiel zurücksetzen">
                    <img src="Fotos/play-taste.png" alt="" width="50">
                    <span class="visually-hidden" data-i18n="game_reset_text">
                        Spiel neu starten
                    </span>
                </button>
            </div>
        </section>

    </main>

    <footer>
    </footer>

</body>

</html>
