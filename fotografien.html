<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="js/script.js" defer></script>
    <title data-i18n="photos_page_title">Fotografien -Mein Portfolio</title>
    <link rel="icon" type="image/png" href="/flav/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/flav/favicon.svg" />
    <link rel="shortcut icon" href="/flav/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/flav/apple-touch-icon.png" />
    <link rel="manifest" href="/flav/site.webmanifest" />
</head>

<body>
    <a href="#main-content" class="skip-link" data-i18n="photos_skip_link">
        Zum Inhalt springen
    </a>

    <header>
    </header>

    <main id="main-content">
        <h1 data-i18n="photos_h1">Fotografien</h1>
        <section id="landschaften">
            <h2 data-i18n="photos_sec1_h2">Landschaften</h2>
            <div class="photo-grid">
                <figure>
                    <picture>
                        <source srcset="Fotos/avif/island1.avif" type="image/avif">
                        <source srcset="Fotos/webp/island1.webp" type="image/webp">
                        <img src="Fotos/island1.jpg" data-i18n-alt="photos_1_alt" alt="See im Nebel" width="200"
                            height="200" fetchpriority="high">
                    </picture>
                    <figcaption data-i18n="photos_1_cap">Ein See im Nebel auf Island</figcaption>
                </figure>
                <figure>
                    <picture>
                        <source srcset="Fotos/avif/island2.avif" type="image/avif">
                        <source srcset="Fotos/webp/island2.webp" type="image/webp">
                        <img src="Fotos/island2.jpg" data-i18n-alt="photos_2_alt" alt="See mit Wolkendecke" width="200"
                            height="200" fetchpriority="high">
                    </picture>
                    <figcaption data-i18n="photos_2_cap">Ein See mit Wolkendecke auf Island</figcaption>
                </figure>
                <figure>
                    <picture>
                        <source srcset="Fotos/avif/island3.avif" type="image/avif">
                        <source srcset="Fotos/webp/island3.webp" type="image/webp">
                        <img src="Fotos/island3.jpg" data-i18n-alt="photos_3_alt" alt="Meer auf Island" width="200"
                            height="200" fetchpriority="high">
                    </picture>
                    <figcaption data-i18n="photos_3_cap">Das Meer vor der Küste Islands</figcaption>
                </figure>
            </div>
        </section>

        <section id="tiere">
            <h2 data-i18n="photos_sec2_h2">Tiere</h2>
            <div class="photo-grid">
                <figure>
                    <picture>
                        <source srcset="Fotos/avif/rind.avif" type="image/avif">
                        <source srcset="Fotos/webp/rind.webp" type="image/webp">
                        <img src="Fotos/rind.jpg" data-i18n-alt="photos_4_alt" alt="Ein schottisches Hochlandrind"
                            width="200" height="200" loading="lazy">
                    </picture>
                    <figcaption data-i18n="photos_4_cap">Ein schottisches Hochlandrind frisst</figcaption>
                </figure>
                <figure>
                    <picture>
                        <source srcset="Fotos/avif/wolf.avif" type="image/avif">
                        <source srcset="Fotos/webp/wolf.webp" type="image/webp">
                        <img src="Fotos/wolf.jpg" data-i18n-alt="photos_5_alt" alt="Mähnenwolf" width="200" height="200"
                            loading="lazy">
                    </picture>
                    <figcaption data-i18n="photos_5_cap">Ein Mähnenwolf wandert umher</figcaption>
                </figure>
                <figure>
                    <picture>
                        <source srcset="Fotos/avif/moewe.avif" type="image/avif">
                        <source srcset="Fotos/webp/moewe.webp" type="image/webp">
                        <img src="Fotos/moewe.jpg" data-i18n-alt="photos_6_alt" alt="Möwe am Strand" width="200"
                            height="200" loading="lazy">
                    </picture>
                    <figcaption data-i18n="photos_6_cap"> Eine Möwe am Strand bei Dahme</figcaption>
                </figure>
            </div>
        </section>

        <section id="pflanzen">
            <h2 data-i18n="photos_sec3_h2">Pflanzen</h2>
            <div class="photo-grid">
                <figure>
                    <picture>
                        <source srcset="Fotos/avif/pilze.avif" type="image/avif">
                        <source srcset="Fotos/webp/pilze.webp" type="image/webp">
                        <img src="Fotos/pilze.jpg" data-i18n-alt="photos_7_alt" alt="Pilze wachsen auf einem Baumstamm"
                            width="200" height="200" loading="lazy">
                    </picture>
                    <figcaption data-i18n="photos_7_cap">Pilze wachsen auf einem Baumstamm im Wald</figcaption>
                </figure>
                <figure>
                    <picture>
                        <source srcset="Fotos/avif/feld.avif" type="image/avif">
                        <source srcset="Fotos/webp/feld.webp" type="image/webp">
                        <img src="Fotos/feld.jpg" data-i18n-alt="photos_8_alt" alt="Kornfeld" width="200" height="200"
                            loading="lazy">
                    </picture>
                    <figcaption data-i18n="photos_8_cap">Ein Kornfeld im Sommer</figcaption>
                </figure>
                <figure>
                    <picture>
                        <source srcset="Fotos/avif/baum.avif" type="image/avif">
                        <source srcset="Fotos/webp/baum.webp" type="image/webp">
                        <img src="Fotos/baum.jpg" data-i18n-alt="photos_9_alt" alt="Ein großer Baum von unten betrachtet"
                            width="200" height="200" loading="lazy">
                    </picture>
                    <figcaption data-i18n="photos_9_cap">Ein großer Baum von unten betrachtet</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
    </footer>
</body>

</html>
