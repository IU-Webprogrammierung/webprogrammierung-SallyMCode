<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">

    <script src="js/script.js" defer></script>
    <title>Fotografien -Mein Portfolio</title>
</head>

<body>
    <a href="#main-content" class="skip-link">
        Zum Inhalt springen
    </a>

    <header>
    </header>

<main id="main-content">
        <h1>Fotografien</h1>
        <section id="landschaften">
            <h2>Landschaften</h2>
            <div class="photo-grid">
                <figure><img src="Fotos/island1.jpg" alt="See im Nebel" width="200" height="200">
                    <figcaption>Ein See im Nebel auf Island</figcaption>
                </figure>
                <figure><img src="Fotos/island2.jpg" alt="See mit Wolkendecke" width="200" height="200">
                    <figcaption>Ein See mit Wolkendecke auf Island</figcaption>
                </figure>
                <figure><img src="Fotos/island3.jpg" alt="Meer auf Island" width="200" height="200">
                    <figcaption>Das Meer vor der Küste Islands</figcaption>
                </figure>
            </div>

        </section>

        <section id="tiere">
            <h2>Tiere</h2>
            <div class="photo-grid">
                <figure><img src="Fotos/rind.jpg" alt="Ein schottisches Hochlandrind" width="200" height="200">
                    <figcaption>Ein schottisches Hochlandrind frisst</figcaption>
                </figure>
                <figure><img src="Fotos/wolf.jpg" alt="Mähnenwolf" width="200" height="200">
                    <figcaption>Ein Mähnenwolf wandert umher</figcaption>
                </figure>
                <figure><img src="Fotos/moewe.jpg" alt="Möwe am Strand" width="200" height="200">
                    <figcaption> Eine Möwe am Strand bei Dahme</figcaption>
                </figure>
            </div>
        </section>

        <section id="pflanzen">
            <h2>Pflanzen</h2>
            <div class="photo-grid">
                <figure><img src="Fotos/pilze.jpg" alt="Pilze wachsen auf einem Baumstamm" width="200" height="200">
                    <figcaption>Pilze wachsen auf einem Baumstamm im Wald</figcaption>
                </figure>
                <figure><img src="Fotos/feld.jpg" alt="Kornfeld" width="200" height="200">
                    <figcaption>Ein Kornfeld im Sommer</figcaption>
                </figure>
                <figure><img src="Fotos/baum.jpg" alt="Ein großer Baum von unten betrachtet" width="200" height="200">
                    <figcaption>Ein großer Baum von unten betrachtet</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
    </footer>

</body>

</html>
