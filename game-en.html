<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - My Portfolio</title>
</head>

<body>
    <a href="#main-content" class="skip-link">
        Skip to main content
    </a>
    <header>
        <!-- Navigation -->
        <nav class="navbar" aria-label="Main navigation">
            <ul>
                <li><a href="index-en.html">Home</a></li>
                <li><a href="blog-en.html">Blog</a></li>
                <li><a href="cvitae.html">Curriculum Vitae</a></li>
                <li><a href="mailto:info@example.com">Contact via Email</a></li>
                <li><a href="photography.html">Photography</a></li>
                <li><a href="travel-reports.html">Travel Reports</a></li>
                <li><a href="github-en.html">GitHub</a></li>
                <li><a href="game-en.html" aria-current="page">Game</a></li>
            </ul>
        </nav>

        <!-- Darkmode -->
        <div class="controls">
            <button type="button" id="theme-toggle">
                <span class="visually-hidden">Toggle Dark Mode</span>
            </button>

            <!-- Sprachauswahl -->
            <label for="language-select" class="visually-hidden">Select Language</label>
            <select id="language-select" onchange="location = this.value;">
                <option value="game-en.html" selected>EN</option>
                <option value="game.html">DE</option>
            </select>
        </div>
    </header>

    <main id="main-content">
        <h1>Tic Tac Toe</h1>

        <section id="game-section">
            <h2 class="visually-hidden">Game Grid</h2>
            <div id="game-grid" role="grid" aria-label="Tic Tac Toe Game Grid" aria-describedby="game-status">
                <!-- 9 Felder für das Spiel -->
                <button class="cell" data-index="0" aria-label="Square 1, empty"></button>
                <button class="cell" data-index="1" aria-label="Square 2, empty"></button>
                <button class="cell" data-index="2" aria-label="Square 3, empty"></button>
                <button class="cell" data-index="3" aria-label="Square 4, empty"></button>
                <button class="cell" data-index="4" aria-label="Square 5, empty"></button>
                <button class="cell" data-index="5" aria-label="Square 6, empty"></button>
                <button class="cell" data-index="6" aria-label="Square 7, empty"></button>
                <button class="cell" data-index="7" aria-label="Square 8, empty"></button>
                <button class="cell" data-index="8" aria-label="Square 9, empty"></button>
            </div>

            <!-- Statusanzeige -->
            <p id="game-status" aria-live="polite">It's Player X's turn</p>

            <!-- Steuerung -->
            <div class="game-controls">
                <button type="button" id="reset-game" aria-label="Reset Game">
                    <img src="Fotos/play-taste.png" alt="Play Symbol" width="50">
                    <span class="visually-hidden">Reset Game</span>
                </button>
            </div>
        </section>

    </main>

    <footer>
        <p>My Portfolio, 2026</p>
    </footer>

</body>

</html>
