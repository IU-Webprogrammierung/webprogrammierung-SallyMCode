<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">

    <script src="js/script.js" defer></script>
    <title>Photography - My Portfolio</title>
</head>

<body>
    <a href="#main-content" class="skip-link">
        Skip to main content
    </a>
    <header>
    </header>

    <main id="main-content">
        <h1>Photography</h1>

        <section id="landscapes">
            <h2>Landscapes</h2>
            <div class="photo-grid">
                <figure>
                    <img src="Fotos/island1.jpg" alt="Lake in the mist" width="200" height="200">
                    <figcaption>Lake in the mist, Iceland</figcaption>
                </figure>
                <figure>
                    <img src="Fotos/island2.jpg" alt="Lake with cloud cover" width="200" height="200">
                    <figcaption>Lake with cloud cover, Iceland</figcaption>
                </figure>
                <figure>
                    <img src="Fotos/island3.jpg" alt="The sea in Iceland" width="200" height="200">
                    <figcaption>The sea in Iceland</figcaption>
                </figure>
            </div>
        </section>

        <section id="wildlife">
            <h2>Wildlife Photography</h2>
            <div class="photo-grid">
                <figure>
                    <img src="Fotos/rind.jpg" alt="Scottish Highland cattle" width="200" height="200">
                    <figcaption>Scottish Highland cattle grazing</figcaption>
                </figure>
                <figure>
                    <img src="Fotos/wolf.jpg" alt="Maned wolf" width="200" height="200">
                    <figcaption>A maned wolf roaming</figcaption>
                </figure>
                <figure>
                    <img src="Fotos/moewe.jpg" alt="Seagull on the beach" width="200" height="200">
                    <figcaption>Seagull on the beach at Dahme</figcaption>
                </figure>
            </div>
        </section>

        <section id="botanical">
            <h2>Plant Photography</h2>
            <div class="photo-grid">
                <figure>
                    <img src="Fotos/pilze.jpg" alt="Mushrooms on a tree trunk" width="200" height="200">
                    <figcaption>Mushrooms growing on a tree trunk</figcaption>
                </figure>
                <figure>
                    <img src="Fotos/feld.jpg" alt="A wheat field in summer" width="200" height="200">
                    <figcaption>A wheat field in summer</figcaption>
                </figure>
                <figure>
                    <img src="Fotos/baum.jpg" alt="Large tree seen from below" width="200" height="200">
                    <figcaption>Large tree viewed from below</figcaption>
                </figure>
            </div>
        </section>
    </main>
    
    <footer>
    </footer>

</body>

</html>
